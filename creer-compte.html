<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion / Inscription - ABIA ESS</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 380px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #1f6f5b;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #1f6f5b;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #155447;
    }

    .switch {
      text-align: center;
      margin-top: 10px;
      cursor: pointer;
      color: #1f6f5b;
    }

    .hidden {
      display: none;
    }

    .title {
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>Se connecter</h2>

    <input type="email" placeholder="Email">
    <input type="password" placeholder="Mot de passe">

    <button>Connexion</button>

    <div class="switch" onclick="toggleForm()">
      Pas de compte ? Créer un compte
    </div>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" class="hidden">
    <h2>Créer un compte</h2>

    <input type="text" placeholder="Nom complet">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Mot de passe">
    <input type="password" placeholder="Confirmer mot de passe">

    <button>Inscription</button>

    <div class="switch" onclick="toggleForm()">
      Déjà un compte ? Se connecter
    </div>
  </div>

</div>

<script>
  function toggleForm() {
    const login = document.getElementById("loginBox");
    const register = document.getElementById("registerBox");

    login.classList.toggle("hidden");
    register.classList.toggle("hidden");
  }
</script>

</body>
</html>
